<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Available Stock</title>

    <link rel="manifest" href="manifest-customer.json">
    <meta name="theme-color" content="#25D366">
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f7f9fa;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #stockContainer {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Horizontal Scroll Gallery (WhatsApp Style) */
        .media-gallery {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .media-item {
            height: 220px;
            width: 160px;
            object-fit: cover;
            border-radius: 10px;
            cursor: pointer;
            background: #000;
            flex-shrink: 0;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
        }

        /* Scrollbar hide karne ke liye */
        .media-gallery::-webkit-scrollbar {
            height: 6px;
        }

        .media-gallery::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 10px;
        }

        /* Full Screen Modal */
        #mediaModal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        #modalClose {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 40px;
            cursor: pointer;
            padding: 10px;
            z-index: 10000;
        }

        .modal-content {
            width: 100%;
            max-height: 90vh;
            object-fit: contain;
        }

        /* Modal Slider Navigation Arrows */
        .modal-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 35px;
            color: white;
            cursor: pointer;
            padding: 15px;
            user-select: none;
            z-index: 10001;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 30px;
            height: 30px;
        }

        #prevBtn {
            left: 15px;
        }

        #nextBtn {
            right: 15px;
        }
    </style>
</head>

<body>

    <h2 style="color: #202124; text-align: center; width: 100%; margin-bottom: 10px;">Live Stock Catalog</h2>

    <div style="text-align: center; margin-bottom: 20px; width: 100%;">
        <span id="totalCustomerCount"
            style="background: #e8f0fe; color: #1a73e8; padding: 6px 15px; border-radius: 20px; font-weight: bold; font-size: 14px; display: inline-block; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">Total
            Products: 0</span>
    </div>

    <div id="stockContainer"></div>
    <div id="mediaModal">
        <span id="modalClose" onclick="closeModal()">&times;</span>
        <div id="prevBtn" class="modal-nav" onclick="changeMedia(-1)">&#10094;</div>
        <div id="nextBtn" class="modal-nav" onclick="changeMedia(1)">&#10095;</div>

        <div id="modalBody" style="width:100%; height:100%; display:flex; justify-content:center; align-items:center;">
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>

</html>
